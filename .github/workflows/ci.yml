name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LLVM_VERSION: 18

jobs:
  # ---------------------------------------------------------------------------
  # Primary Linux job. This one is authoritative: it builds the compiler and the
  # unit-test binary, runs the C++ unit tests via ctest, and runs the end-to-end
  # .to test suite. Any real failure fails the job (no continue-on-error here).
  # ---------------------------------------------------------------------------
  linux:
    name: Linux (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          # llvm-18-dev provides the LLVM development files and CMake config;
          # llvm-18 provides the command-line tools, including lli-18 which the
          # .to test runner uses to execute compiled LLVM IR.
          sudo apt-get install -y \
            llvm-${{ env.LLVM_VERSION }} \
            llvm-${{ env.LLVM_VERSION }}-dev \
            llvm-${{ env.LLVM_VERSION }}-tools \
            clang-${{ env.LLVM_VERSION }} \
            libffi-dev \
            libzstd-dev \
            libxml2-dev \
            zlib1g-dev \
            python3-dev \
            ninja-build \
            cmake

      - name: Verify toolchain
        run: |
          cmake --version
          clang-${{ env.LLVM_VERSION }} --version
          lli-${{ env.LLVM_VERSION }} --version
          ls /usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/llvm

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DWITH_V8=OFF \
            -DWITH_PYTHON=ON \
            -DENABLE_TESTING=ON \
            -DLLVM_DIR=/usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/llvm

      - name: Build compiler and tests
        run: ninja -C build tocin tocin_tests

      - name: Run C++ unit tests (ctest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Run .to end-to-end tests
        run: bash scripts/run_to_tests.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tocin-linux-${{ matrix.build_type }}
          path: |
            build/tocin
            build/tocin_tests
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # macOS build is best-effort: it builds the compiler and runs whatever tests
  # it can, but is allowed to fail without blocking the pipeline.
  # ---------------------------------------------------------------------------
  macos:
    name: macOS (best-effort)
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install llvm@18 zstd libxml2 ninja libffi || true
          echo "LLVM_DIR=$(brew --prefix llvm@18)/lib/cmake/llvm" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm@18)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_V8=OFF \
            -DWITH_PYTHON=ON \
            -DENABLE_TESTING=ON \
            -DLLVM_DIR="${LLVM_DIR}"

      - name: Build compiler and tests
        run: ninja -C build tocin tocin_tests

      - name: Run C++ unit tests (ctest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Run .to end-to-end tests
        run: bash scripts/run_to_tests.sh

  # ---------------------------------------------------------------------------
  # Windows build is best-effort.
  # ---------------------------------------------------------------------------
  windows:
    name: Windows (best-effort)
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm --version=18.1.8 -y --no-progress
          choco install ninja -y --no-progress
          echo "LLVM_DIR=C:\Program Files\LLVM\lib\cmake\llvm" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_V8=OFF \
            -DWITH_PYTHON=ON \
            -DENABLE_TESTING=ON \
            -DLLVM_DIR="${LLVM_DIR}"

      - name: Build compiler and tests
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Run C++ unit tests (ctest)
        shell: bash
        working-directory: build
        run: ctest --output-on-failure -C Release || true

  # ---------------------------------------------------------------------------
  # Static analysis is advisory only: findings are reported but never block CI.
  # ---------------------------------------------------------------------------
  static-analysis:
    name: Static Analysis (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-${{ env.LLVM_VERSION }} cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --suppress=missingIncludeSystem src/ || true
